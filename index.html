<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vaktija Østfold</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #0B6E4F, #F4F7F5);
  margin: 0;
}

header {
  padding: 30px 20px;
  text-align: center;
  color: white;
}

h1 {
  margin: 0;
}

.container {
  background: #F4F7F5;
  border-radius: 25px 25px 0 0;
  padding: 20px;
  min-height: 80vh;
}

.nav {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #0B6E4F;
  color: white;
}

.prayer {
  display: flex;
  justify-content: space-between;
  background: white;
  padding: 15px;
  margin: 8px 0;
  border-radius: 12px;
}

.next {
  background: #0B6E4F;
  color: white;
}

.prayer-name {
  font-family: 'Amiri', serif;
}

.countdown {
  text-align: center;
  margin-top: 20px;
  font-size: 24px;
}
</style>
</head>

<body>

<header>
  <h1>🕌 Vaktija Østfold</h1>
  <input type="date" id="datePicker">
</header>

<div class="container">

<div class="nav">
  <button onclick="prevDay()">⬅️</button>
  <button onclick="nextDay()">➡️</button>
</div>

<div id="prayers"></div>

<div id="countdown" class="countdown"></div>

</div>

<script>

let rows = []

fetch("vaktija.csv")
.then(res => res.text())
.then(text => {

  rows = text.split("\n").slice(1)

  const today = new Date().toISOString().split("T")[0]
  document.getElementById("datePicker").value = today

  loadDay()

})

function loadDay(){

  const selectedDate = document.getElementById("datePicker").value

  const formattedDate = selectedDate.split("-").reverse().join(".")

  const line = rows.find(r => r.includes(formattedDate))

  if(!line){
    document.getElementById("prayers").innerText = "Ingen data"
    return
  }

  let cols = line.split(";")
  if(cols.length < 5){
    cols = line.split(",")
  }

  const prayers = [
    { name: "Sabah / Fajr", time: cols[1] },
    { name: "Podne / Dhuhr", time: cols[2] },
    { name: "Ikindija / Asr", time: cols[3] },
    { name: "Akšam / Maghrib", time: cols[4] },
    { name: "Jacija / Isha", time: cols[5] }
  ]

  const now = new Date()

  let nextPrayer = null

  for(let p of prayers){
    const [h,m] = p.time.split(":")
    const t = new Date()
    t.setHours(h, m, 0)

    if(t > now){
      nextPrayer = p
      break
    }
  }

  if(!nextPrayer){
    nextPrayer = prayers[0]
  }

  document.getElementById("prayers").innerHTML =
    prayers.map(p => `
      <div class="prayer ${p.name === nextPrayer.name ? "next" : ""}">
        <span class="prayer-name">${p.name}</span>
        <span>${p.time}</span>
      </div>
    `).join("")

  startCountdown(nextPrayer.time)
}

let interval

function startCountdown(time){

  if(interval){
    clearInterval(interval)
  }

  interval = setInterval(() => {

    const now = new Date()
    const [h,m] = time.split(":")

    let target = new Date()
    target.setHours(h,m,0)

    if(target <= now){
      target.setDate(target.getDate()+1)
    }

    const diff = target - now

    const hDiff = Math.floor(diff/3600000)
    const mDiff = Math.floor((diff%3600000)/60000)
    const sDiff = Math.floor((diff%60000)/1000)

    document.getElementById("countdown").innerText =
      `Neste bønn om ${hDiff}:${mDiff}:${sDiff}`

  },1000)
}

function prevDay(){
  const d = new Date(document.getElementById("datePicker").value)
  d.setDate(d.getDate()-1)
  document.getElementById("datePicker").value = d.toISOString().split("T")[0]
  loadDay()
}

function nextDay(){
  const d = new Date(document.getElementById("datePicker").value)
  d.setDate(d.getDate()+1)
  document.getElementById("datePicker").value = d.toISOString().split("T")[0]
  loadDay()
}

document.getElementById("datePicker").addEventListener("change", loadDay)

</script>

</body>
</html>
